name: Update Prerelease Reference Pages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version (e.g., 1.9.24)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Prerelease version (e.g., 1.9.24)'
        required: true
        type: string
    secrets:
      ISSUE_COMMENT_TRIGGER_PAT:
        required: true

jobs:
  update-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prerelease branch
        uses: actions/checkout@v4
        with:
          ref: prerelease

      - name: Check for existing PR
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if there's already an open PR for this version
          pr_count=$(gh pr list \
            --base prerelease \
            --state open \
            --search "Update reference pages for v${{ inputs.version }}" \
            --json number \
            --jq 'length')
          echo "existing_pr=$pr_count" >> "$GITHUB_OUTPUT"
          echo "Existing PRs for this version: $pr_count"

          if [ "$pr_count" != "0" ]; then
            echo "::notice::Skipping - PR already exists for v${{ inputs.version }}"
          fi

      # --- Setup steps (only run if no existing PR) ---

      - name: Install Quarto (prerelease)
        if: steps.check-pr.outputs.existing_pr == '0'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ inputs.version }}

      - name: Verify Quarto version
        if: steps.check-pr.outputs.existing_pr == '0'
        run: quarto --version

      - name: Clone quarto-cli at matching tag
        if: steps.check-pr.outputs.existing_pr == '0'
        run: |
          git clone --depth 1 --branch v${{ inputs.version }} \
            https://github.com/quarto-dev/quarto-cli.git \
            ../quarto-cli

      - name: Setup R
        if: steps.check-pr.outputs.existing_pr == '0'
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        if: steps.check-pr.outputs.existing_pr == '0'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            jsonlite
            knitr
            here
            tidyverse
            fansi
            xfun

      # --- Run reference generation scripts ---

      - name: Generate format/cell/project reference JSON
        if: steps.check-pr.outputs.existing_pr == '0'
        run: |
          quarto run tools/reference.ts

      - name: Generate CLI reference
        if: steps.check-pr.outputs.existing_pr == '0'
        run: |
          # Generate CLI info JSON
          quarto dev-call cli-info > docs/cli/cli-info.json
          # Generate markdown from JSON
          quarto run tools/reference-cli-generate-md.R

      # --- Create PR ---

      - name: Create branch and PR
        id: create-pr
        if: steps.check-pr.outputs.existing_pr == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.version }}"
          branch="auto/prerelease-reference-v${version}"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git checkout -b "$branch"
          git add -A

          # Capture summary of changes before committing
          diff_stat=$(git diff --cached --stat | tail -1)
          changed_files=$(git diff --cached --name-only)

          git commit -m "Update reference pages for v${version}"
          git push origin "$branch"

          pr_url=$(gh pr create \
            --base prerelease \
            --head "$branch" \
            --title "Update reference pages for v${version}" \
            --body "$(cat <<EOF
          Automated update of reference documentation for Quarto prerelease v${version}.

          ## Summary

          ${diff_stat}

          ## Changed files

          \`\`\`
          ${changed_files}
          \`\`\`

          ## Scripts run

          - \`tools/reference.ts\` - format/cell/project reference JSON
          - \`tools/reference-cli-generate-md.R\` - CLI reference markdown
          EOF
          )")

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Assign PR
        if: steps.check-pr.outputs.existing_pr == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ steps.create-pr.outputs.pr_url }}" --add-assignee cwickham

      - name: Trigger preview deployment
        if: steps.check-pr.outputs.existing_pr == '0'
        env:
          GH_TOKEN: ${{ secrets.ISSUE_COMMENT_TRIGGER_PAT }}
        run: |
          gh pr comment "${{ steps.create-pr.outputs.pr_url }}" --body "/deploy-preview"
