name: 'Detect Draft Pages'
description: 'Scan changed .qmd files for draft: true in YAML frontmatter'
inputs:
  changed-files:
    description: 'JSON array of changed file paths (from tj-actions/changed-files)'
    required: true
outputs:
  found:
    description: 'Whether any draft pages were found (true/false)'
    value: ${{ steps.detect.outputs.found }}
  files:
    description: 'Newline-separated list of draft file paths'
    value: ${{ steps.detect.outputs.files }}
runs:
  using: composite
  steps:
    - id: detect
      run: |
        CHANGED='${{ inputs.changed-files }}'
        DRAFTS=$(echo "$CHANGED" | jq -r '.[]' | while read -r file; do
          if [[ "$file" == *.qmd ]] && [ -f "$file" ]; then
            if sed -n '/^---$/,/^---$/p' "$file" | grep -qE '^\s*draft:\s*true\s*$'; then
              echo "$file"
            fi
          fi
        done)
        if [ -n "$DRAFTS" ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DRAFTS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
