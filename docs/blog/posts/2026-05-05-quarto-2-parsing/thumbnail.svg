<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Futura, 'Open Sans', 'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="630" fill="#42729b"/>

  <!-- Top: quarto 2 branding (logo + wordmark) -->
  <g transform="translate(370, 50)">
    <!-- Quarto logo: light disc with full-diameter cross dividing it into four quadrants -->
    <circle cx="55" cy="55" r="50" fill="#b7c6da"/>
    <line x1="55" y1="-3"  x2="55" y2="113" stroke="#42729b" stroke-width="6" stroke-linecap="butt"/>
    <line x1="-3" y1="55"  x2="113" y2="55" stroke="#42729b" stroke-width="6" stroke-linecap="butt"/>

    <text x="125" y="88" font-size="92" fill="#ffffff" font-weight="300"
          font-family="'Futura Light', 'Futura PT Light', Jost, 'Avenir Light', Avenir, Futura, sans-serif">quarto</text>
    <text x="408" y="64" font-size="22" fill="#ffffff" font-weight="400">®</text>
    <text x="448" y="88" font-size="92" fill="#ffffff" font-weight="700"
          font-family="Futura, Jost, Avenir, sans-serif">2</text>
  </g>

  <!-- Subtitle / post title -->
  <text x="600" y="210" text-anchor="middle" font-size="48" fill="#ffffff" font-weight="600">Parsing &amp; Source Maps</text>

  <!-- Parse tree (the tree-sitter / parsing allusion) -->
  <g transform="translate(600, 260)" text-anchor="middle">
    <!-- Edges -->
    <g stroke="#ffffff" stroke-width="3" fill="none" opacity="0.9">
      <line x1="0"    y1="36"  x2="-220" y2="116"/>
      <line x1="0"    y1="36"  x2="220"  y2="116"/>
      <line x1="-220" y1="148" x2="-310" y2="232"/>
      <line x1="-220" y1="148" x2="-130" y2="232"/>
      <line x1="220"  y1="148" x2="140"  y2="232"/>
      <line x1="220"  y1="148" x2="300"  y2="232"/>
    </g>

    <!-- Nodes -->
    <g font-weight="600">
      <ellipse cx="0" cy="16" rx="68" ry="28" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="0" y="25" font-size="26" fill="#324c66">Doc</text>

      <ellipse cx="-220" cy="132" rx="92" ry="28" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="-220" y="141" font-size="26" fill="#324c66">Header</text>

      <ellipse cx="220" cy="132" rx="60" ry="28" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="220" y="141" font-size="26" fill="#324c66">Div</text>

      <ellipse cx="-310" cy="248" rx="56" ry="24" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="-310" y="255" font-size="22" fill="#324c66">Str</text>

      <ellipse cx="-130" cy="248" rx="56" ry="24" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="-130" y="255" font-size="22" fill="#324c66">Str</text>

      <ellipse cx="140" cy="248" rx="68" ry="24" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="140" y="255" font-size="22" fill="#324c66">Para</text>

      <ellipse cx="300" cy="248" rx="68" ry="24" fill="#ffffff" stroke="#324c66" stroke-width="2"/>
      <text x="300" y="255" font-size="22" fill="#324c66">Para</text>
    </g>
  </g>
</svg>
